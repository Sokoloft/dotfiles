# yaml
# sokoloft 1/20/26

# Sensor information, to get temperature data
sensors:
    # tpacpi - CPU temp
    - tpacpi: /proc/acpi/ibm/thermal
      indices: [0]


# Fans configuration
fans:
    # tpacpi - CPU fans
    - tpacpi: /proc/acpi/ibm/fan


# Fan speed levels
levels:
    # temperature/fan curve/values from reddit
    - [0, 0, 42]
    - [1, 38, 55]
    - [2, 50, 58]
    - [3, 54, 63]
    - [4, 58, 68]
    - [5, 62, 70]
    - [level auto, 64, 76]
    - [level disengaged, 68, 255]

